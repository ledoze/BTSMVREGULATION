<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>BTSMV RÉGULATION 2022:V1.2</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
      <main class="grid"> 
      <div class="container2">
           <textarea id="text-identite" name="identite"  cols="15" rows="1">NOM PRÉNOM</textarea>       
           <button id="button-valider"  name="valider">VALIDER</button> 
           <!--
           <input type='file' accept='text/plain' onchange='openFile(event)' id="openFile">           
           <div id='output'>   ....       </div>
           -->
           <textarea id="textData" rows="1" placeholder="Warning to save"></textarea>
           
      </div>      
       <div class="container">            
          <div class="item">          
              <div class= "process">
                    <div class="afficheconsigne">
                      <label for="slider-consigne" class="centre" >Consigne</label>                      
                      <input type="text" id="text-consigne" class="textright" name="consigne"  cols="2" rows="1" style="color: #FF0000;"/>
                      <input style="accent-color: red" type="range" id="slider-consigne"  name="sliderconsigne" min="0"max="100" value="0" step="10" />
                      <button id="button-bf" class="button1" name="bf">BOUCLE-FERMÉE</button>
                      <button id="button-saturation" class="button1"  name="saturation">SATURATION</button>
                      <label for="slider-Kp">K_proportionnel</label>
                      <input style="accent-color: red" type="range" id="slider-Kp" name="sliderKp" min="0"max="100" value="1" step="1" />
                      <label for="slider-Ki">K_intégral</label>
                      <input style="accent-color: red" type="range" id="slider-Ki" name="sliderKi" min="0"max="100" value="0" step="1" />
                      <label for="slider-Kd">K_dérivée</label>
                      <input style="accent-color: red" type="range" id="slider-Kd" name="sliderKd" min="0"max="100" value="0" step="1" /> 
                      <div>
                   <!--    <button data-playing="init" id="play-button1" class="ch1">ON</button>   --> 
                        <label for="type-select1" class="ch1">                                                    
                        Gene1<button data-playing="init" id="play-button1" class="ch1">OFF</button> 
                        <select id="type-select1" class="ch1">
                        <option>sine</option>
                        <option>square</option>
                        <option>triangle</option>
                        <option>sawtooth</option>
                        <option>DC</option>
                        </select>
                        </label>                                           
                        </div>                      
                      <div>                     
                        <label for="slider-amp" class="gold">V1max/V </label>  
                        <input style="accent-color: #fffb00" type="range" id="slider-ampch1" name="slideramp" min="0"max="1" value="0.5" step="0.1" /> 
                        <input type="text" id="text-v1" class="textv1" name="textv1"   style="color: #f0ec21;"/>    
                        </div> 
                      <div>                     
                        <label for="slider-freqch1" class="gold">F1/Hz</label>                       
                        <input style="accent-color: #fffb00"" type="range" id="slider-freqch1" name="sliderfreq1" min="0"max="10000" value="100" step="1" />                        
                        <input type="text" id="text-f1" class="textv1" name="textf1"   style="color: #f0ec21;"/>    
                        </div>
                      <div>
                        <button id="button-plusoffset1" class="ch1" name="v1offplus">DC +</button>
                        <button id="button-moinsoffset1" class="ch1" name="v1offmoins">DC -</button>
                        <input type="text" id="text-offset1" class="textv1" name="textoffset1"   style="color: #FF0000;"/>
                        <button id="button-v1gnd" class="ch1" name="v1gnd">GND</button>
                        </div>                      
                      <div>                                          
                        <label for="type-select2" class="ch2">
                        Gene2<button data-playing="init" id="play-button2" class="ch2">OFF</button>
                        <select id="type-select2" class="ch2">
                        <option>sine</option>
                        <option>square</option>
                        <option>triangle</option>
                        <option>sawtooth</option>
                        <option>DC</option>
                        </select>
                        </label>                         
                        </div>                        
                      <div>                     
                        <label for="slider-amp2" class="bleue">V2max/V </label>  
                        <input style="accent-color: #3b1ee2" type="range" id="slider-ampch2" name="slideramp2" min="0"max="10" value="1" step="0.1" /> 
                        <input type="text" id="text-v2" class="textv2" name="textv2"   style="color: #FF0000;"/>    
                        </div> 
                      <div>                     
                        <label for="slider-freqch2" class="bleue">F2/Hz</label>                       
                        <input style="accent-color: #3b1ee2"" type="range" id="slider-freqch2" name="sliderfreq2" min="0"max="1000" value="440" step="1" />                        
                        <input type="text" id="text-f2" class="textv2" name="textf2"   style="color: #FF0000;"/>    
                        </div>
                      <div>
                        <button id="button-plusoffset2" class="ch2" name="v2offplus">DC +</button>
                        <button id="button-moinsoffset2" class="ch2" name="v2offmoins">DC -</button>
                        <input type="text" id="text-offset2" class="textv2" name="textoffset2"   style="color: #FF0000;"/>
                        <button id="button-v2gnd" class="ch2" name="v2gnd">GND</button>
                        </div>    
                                             
                    </div>
                    <div class="vertical">
                        <div class="boutonperturb">
                            <button id="button-perturbplus" class="button3" name="perturplus">PERTURBATION +</button>           
                            <button id="button-perturbmoins" class="button3" name="perturmoins">PERTURBATION --</button>                        
                        </div>
                         <div>
                             <canvas id="canvas-boucle" class="schemaboucle" width="512px" ></canvas>
                         </div>                      
                         <div>
                             <canvas id="canvas" class="scope" width="512px" height="512px"></canvas>
                         </div>
                    </div>
                    
                 
                    <div class="boutonscope">
                      <label for="text-mesure" class="centrebleu" >Mesure</label>                    
                      <input type="text" id="text-mesure" class="textleftbleu" name="mesure" cols="2" rows="1" style="color: #0000FF;"/>                    
                      <label for="slider-gs" class="bleue">Gain Statique</label>  
                      <input style="accent-color: blue" type="range" id="slider-gs" name="slidergs" min="0"max="100" value="10" step="1" />                      
                      <label for="slider-tau" class="bleue">Cst Temps</label>                       
                      <input style="accent-color: blue" type="range" id="slider-tau" name="slidertau" min="0"max="1000" value="440" step="1" />  
                      <button id="button-bo" class="button2" name="bo">BOUCLE-OUVERTE</button>                  
                        <div>
                        <button id="button-simul" class="button4" name="simul">SIMULATION</button>
                        <button id="button-autoset1" class="button4" name="autoset">AUTOSET1</button> 
                        </div>                        
                        <div>
                        <button id="button-pause" class="button4"  name="pause">PAUSE</button>
                        <button id="button-debut" class="button4" name="debut">DEBUT</button>
                        </div>                        
                        <div>
                        <label  class="labelscope" >VERTICAL V/Div</label>
                        </div>
                        <div>                       
                        <button id="button-ch1plus" class="ch1" name="ch1plus">CH1 +</button> 
                        <button id="button-ch1moins" class="ch1" name="ch1moins">CH1 -</button>
                        <button id="button-ch1dc" class="ch1" name="ch1DC">DC</button>
                        <button id="button-ch1ac" class="ch1" name="ch1AC">AC</button>
                        <button id="button-ch1gnd" class="ch1" name="ch1GND">GND</button>
                        </div>
                        <div>
                        <button id="button-ch2plus" class="ch2" name="ch2plus">CH2 +</button> 
                        <button id="button-ch2moins" class="ch2" name="ch2moins">CH2 -</button> 
                        <button id="button-ch2dc" class="ch2" name="ch2DC">DC</button>
                        <button id="button-ch2ac" class="ch2" name="ch2AC">AC</button>
                        <button id="button-ch2gnd" class="ch2" name="ch2GND">GND</button>
                        </div>                     
                        <div>
                        <label  class="labelscope" >POS</label>
                        <button id="button-ch1posplus" class="ch1" name="ch1posplus">CH1 &#8607</button> 
                        <button id="button-ch1posmoins" class="ch1" name="ch1posmoins">CH1 &#8609</button>
                        <button id="button-ch2posplus" class="ch2" name="ch2posplus">CH2 &#8607</button> 
                        <button id="button-ch2posmoins" class="ch2" name="ch2posmoins">CH2 &#8609</button> 
                        </div>
                        <div>
                        <label  class="labelscope" >HORIZONTAL</label>
                        <button id="button-xplus" class="button4" name="yplus">TIME +</button> 
                        <button id="button-xmoins" class="button4" name="ymoins">TIME -</button> 
                        </div>   
                        <div>
                        <label  class="labelscope" >TRIGGER</label>
                        <button id="button-trigch1" class="ch1" name="trigch1">CH1</button> 
                        <button id="button-trigch2" class="ch2" name="trigch2">CH2</button> 
                        <button id="button-trigchplus" class="button4" name="trigplusch"> &#8607</button> 
                        <button id="button-trigchmoins" class="button4" name="trigchmoins"> &#8609</button> 
                        </div>        
                        
                        <!-- -->
                        <div>
                        <label  class="labelscope" >MATHS</label>
                        <button id="button-ch1moinsch2" class="math" name="ch1moinsch2">CH1-CH2</button>
                        <button id="button-ch2moinsch1" class="math" name="ch2moinsch1">CH2-CH1</button>
                        <button id="button-ch1plusch2" class="math" name="ch1plusch2">CH1+CH2</button>                        
                        </div>
                        <div>
                        <button id="button-ch1ch2" class="math" name="ch1ch2">CH1*CH2</button>
                        <button id="button-ch1fft" class="math" name="ch1fft">FFT CH1</button>
                        <button id="button-ch2fft" class="math" name="ch2fft">FFT CH2</button>
                        </div>
                        <div>
                        <input type="text" id="text-v1moy" class="textv1" name="textv1moy"   style="color: #f0ec21;"/>
                        </div>
                        <!-- -->
                        <div>
                        <button id="button-save" class="button4"  name="save">SAVE</button>  
                        </div>
                      </div>                           
              </div>                           
          </div>         
       </div>
  </main>  
    <script src="index2.js" defer></script>
    <link href="index.css" rel="stylesheet"> 
  </body>
</html>
