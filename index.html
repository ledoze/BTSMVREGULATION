<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>BTSMV RÉGULATION 2022:V1.2</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
      <main class="grid"> 
      <div class="container2">
           <textarea id="text-identite" name="identite"  cols="15" rows="1">NOM PRÉNOM</textarea>       
           <button id="button-valider"  name="valider">VALIDER</button> 
           <!--
           <input type='file' accept='text/plain' onchange='openFile(event)' id="openFile">           
           <div id='output'>   ....       </div>
           -->
           <textarea id="textData" rows="1" placeholder="Warning to save"></textarea>
           
      </div>      
       <div class="container">            
          <div class="item">          
              <div class= "process">
                    <div class="afficheconsigne">
                      <label for="slider-consigne" class="centre" >Consigne</label>                      
                      <input type="text" id="text-consigne" class="textright" name="consigne"  cols="2" rows="1" style="color: #FF0000;"/>
                      <input style="accent-color: red" type="range" id="slider-consigne"  name="sliderconsigne" min="0"max="100" value="0" step="10" />
                      <button id="button-bf" class="button1" name="bf">BOUCLE-FERMÉE</button>
                      <button id="button-saturation" class="button1"  name="saturation">SATURATION</button>
                      <label for="slider-Kp">K_proportionnel</label>
                      <input style="accent-color: red" type="range" id="slider-Kp" name="sliderKp" min="0"max="100" value="1" step="1" />
                      <label for="slider-Ki">K_intégral</label>
                      <input style="accent-color: red" type="range" id="slider-Ki" name="sliderKi" min="0"max="100" value="0" step="1" />
                      <label for="slider-Kd">K_dérivée</label>
                      <input style="accent-color: red" type="range" id="slider-Kd" name="sliderKd" min="0"max="100" value="0" step="1" />                      
                    </div>
                    <div class="vertical">
                        <div class="boutonperturb">
                            <button id="button-perturbplus" class="button3" name="perturplus">PERTURBATION +</button>           
                            <button id="button-perturbmoins" class="button3" name="perturmoins">PERTURBATION --</button>                        
                        </div>
                         <div>
                             <canvas id="canvas-boucle" class="schemaboucle" width="600px" ></canvas>
                         </div>                      
                         <div>
                             <canvas id="canvas" class="scope" width="600px" height="400px"></canvas>
                         </div>
                    </div>                    
                    <div class="afficheprocess">
                      <label for="text-mesure" class="centre" >Mesure</label>                    
                      <input type="text" id="text-mesure" class="textleft" name="mesure" cols="2" rows="1" style="color: #0000FF;"/>                    
                      <label for="slider-gs">GainStatique</label>  
                      <input style="accent-color: blue" type="range" id="slider-gs" name="slidergs" min="0"max="100" value="1" step="1" />                      
                      <label for="slider-tau">CstTemps</label>                       
                      <input style="accent-color: blue" type="range" id="slider-tau" name="slidertau" min="0"max="10" value="2" step="1" />  
                      <button id="button-bo" class="button2" name="bo">BOUCLE-OUVERTE</button>                      
                      <div class="boutonscope">
                        <div>
                        <button id="button-simul" class="button4" name="simul">SIMULATION</button>
                        <button id="button-acquisition" class="button4" name="acquisition">ACQUISITION</button> 
                        </div>                        
                        <div>
                        <button id="button-pause" class="button4"  name="pause">PAUSE</button>
                        <button id="button-debut" class="button4" name="debut">DEBUT</button>
                        </div>                        
                        <div>
                        <label  class="labelscope" >VERTICAL V/Div</label>
                        </div>
                        <div>                       
                        <button id="button-ch1plus" class="ch1" name="ch1plus">CH1 +</button> 
                        <button id="button-ch1moins" class="ch1" name="ch1moins">CH1 -</button>
                        <button id="button-ch1dc" class="ch1" name="ch1DC">DC</button>
                        <button id="button-ch1ac" class="ch1" name="ch1AC">AC</button>
                        <button id="button-ch1gnd" class="ch1" name="ch1GND">GND</button>
                        </div>
                        <div>
                        <button id="button-ch2plus" class="ch2" name="ch2plus">CH2 +</button> 
                        <button id="button-ch2moins" class="ch2" name="ch2moins">CH2 -</button> 
                        <button id="button-ch2dc" class="ch2" name="ch2DC">DC</button>
                        <button id="button-ch2ac" class="ch2" name="ch2AC">AC</button>
                        <button id="button-ch2gnd" class="ch2" name="ch2GND">GND</button>
                        </div>
                     <!--
                      <label  class="button4" >V/Div</label> 
                         <div>
                        <button id="button-ch1plus" class="ch1" name="ch1plus">CH1 +</button> 
                        <button id="button-ch1moins" class="ch1" name="ch1timemoins">CH1 -</button> 
                        </div>
                        
                        <label  class="labelscope" >position</label>
                        <div>
                        <button id="button-ch2plus" class="button4" name="ch2plus">CH2 +</button> 
                        <button id="button-ch2moins" class="button4" name="ch2moins">CH2 -</button> 
                        </div>
                      -->
                        <div>
                        <label  class="labelscope" >POS</label>
                        <button id="button-ch1posplus" class="ch1" name="ch1posplus">CH1 &#8607;</button> 
                        <button id="button-ch1posmoins" class="ch1" name="ch1posmoins">CH1 &#8609</button>
                        <button id="button-ch2posplus" class="ch2" name="ch2posplus">CH2 &#8607</button> 
                        <button id="button-ch2posmoins" class="ch2" name="ch2posmoins">CH2 &#8609</button> 
                        </div>
                        <div>
                        <label  class="labelscope" >HORIZONTAL</label>
                        <button id="button-yplus" class="button4" name="yplus">TIME +</button> 
                        <button id="button-ymoins" class="button4" name="ymoins">TIME -</button> 
                        </div>                        
                        <!-- -->
                        <div>
                        <label  class="labelscope" >MATHS</label>
                        <button id="button-ch1moinsch2" class="math" name="ch1moinsch2">CH1-CH2</button> 
                        <button id="button-ch1plusch2" class="math" name="ch1plusch2">CH1+CH2</button>                        
                        </div>
                        <div>
                        <button id="button-ch1ch2" class="math" name="ch1ch2">CH1*CH2</button>
                        <button id="button-ch1fft" class="math" name="ch1fft">FFT CH1</button>
                        <button id="button-ch2fft" class="math" name="ch2fft">FFT CH2</button>
                        </div>
                        <!-- -->
                        <div>
                        <button id="button-save" class="button4"  name="save">SAVE</button>  
                        </div>
                      </div>
                    </div>                    
              </div>                           
          </div>         
       </div>
  </main>  
    <script src="index.js" defer></script>
    <link href="index.css" rel="stylesheet"> 
  </body>
</html>
